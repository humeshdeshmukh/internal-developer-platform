apiVersion: v1
kind: ServiceAccount
metadata:
  name: idp-portal-sa
  namespace: idp-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: idp-portal-role
rules:
- apiGroups: [""]
  resources: ["pods", "services", "namespaces", "secrets", "configmaps", "resourcequotas", "persistentvolumeclaims"]
  verbs: ["*"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["*"]
- apiGroups: ["argoproj.io"]
  resources: ["applications"]
  verbs: ["*"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: idp-portal-role-binding
subjects:
- kind: ServiceAccount
  name: idp-portal-sa
  namespace: idp-system
roleRef:
  kind: ClusterRole
  name: idp-portal-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: idp-portal
  namespace: idp-system
  labels:
    app: idp-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: idp-portal
  template:
    metadata:
      labels:
        app: idp-portal
    spec:
      serviceAccountName: idp-portal-sa
      containers:
      - name: portal
        image: idp-portal:v6
        imagePullPolicy: Never
        ports:
        - containerPort: 5007
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 400m
            memory: 256Mi
        env:
        - name: PORT
          value: "5007"
        - name: FLASK_ENV
          value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: idp-portal
  namespace: idp-system
spec:
  type: NodePort
  ports:
  - port: 5007
    targetPort: 5007
    nodePort: 30507
  selector:
    app: idp-portal
